<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا - الواحة</title>
    
    <!-- SEO -->
    <meta name="description" content="تواصل معنا في متجر الواحة - نسعد بخدمتك، اتصل بنا أو أرسل رسالة وسنرد عليك في أقرب وقت" />
    <meta name="keywords" content="تواصل, اتصل بنا, الواحة, خضروات, فاكهة, استفسار" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    
    <style>
        .page-container {
            max-width: 900px;
            margin: 100px auto 40px;
            padding: 20px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .page-container h1 {
            font-size: 36px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
        }
        .page-container .subtitle {
            text-align: center;
            color: #5a7a5a;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .contact-item:hover {
            border-color: var(--gold);
            transform: translateX(-4px);
        }
        .contact-item .icon {
            width: 50px;
            height: 50px;
            background: rgba(212,175,55,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gold);
            flex-shrink: 0;
        }
        .contact-item .info h4 {
            font-size: 15px;
            color: var(--primary);
            margin-bottom: 2px;
        }
        .contact-item .info p {
            font-size: 14px;
            color: #5a7a5a;
        }
        .contact-item .info a {
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }
        .contact-item .info a:hover {
            color: var(--gold);
        }
        .contact-form {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }
        .contact-form .form-group {
            margin-bottom: 15px;
        }
        .contact-form .form-group label {
            display: block;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 14px;
        }
        .contact-form .form-group input,
        .contact-form .form-group textarea,
        .contact-form .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(26,92,58,0.08);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            background: rgba(255,255,255,0.3);
            transition: var(--transition);
            color: var(--text-color);
        }
        .contact-form .form-group input:focus,
        .contact-form .form-group textarea:focus {
            border-color: var(--gold);
            outline: none;
        }
        .contact-form .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .contact-form .btn-submit {
            background: var(--gold);
            color: var(--primary-dark);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            font-family: 'Tajawal', sans-serif;
        }
        .contact-form .btn-submit:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.02);
        }
        .social-section {
            margin-top: 20px;
            text-align: center;
        }
        .social-section .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .social-section .social-icons a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            transition: var(--transition);
            text-decoration: none;
        }
        .social-section .social-icons a:hover {
            transform: scale(1.1);
        }
        .social-section .social-icons .whatsapp { background: #25D366; }
        .social-section .social-icons .facebook { background: #1877F2; }
        .social-section .social-icons .instagram { background: #E4405F; }
        .social-section .social-icons .twitter { background: #1DA1F2; }
        .social-section .social-icons .youtube { background: #FF0000; }
        
        .back-link {
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 20px;
        }
        .back-link:hover {
            background: var(--gold);
            color: var(--primary-dark);
        }
        
        @media (max-width: 768px) {
            .page-container { margin: 80px 10px 20px; padding: 15px; }
            .page-container h1 { font-size: 28px; }
            .contact-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .page-container h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ابحث..." />
            </div>
        </div>
        <div class="logo">
            <a href="../index.html" style="text-decoration:none;">
                <div class="arabic">الواحة 🌱</div>
            </a>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="document.documentElement.toggleAttribute('data-theme')" title="تبديل المظهر">
                <i class="fas fa-moon"></i>
            </button>
            <a href="../index.html" class="admin-link" title="الرجوع للمتجر">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </header>

    <!-- ===== PAGE CONTENT ===== -->
    <div class="page-container">
        <h1>📞 تواصل معنا</h1>
        <p class="subtitle">نسعد بخدمتك، اتصل بنا أو أرسل رسالة وسنرد عليك في أقرب وقت</p>

        <div class="contact-grid">
            <!-- معلومات التواصل -->
            <div class="contact-info">
                <div class="contact-item">
                    <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info">
                        <h4>العنوان</h4>
                        <p>القاهرة، مصر</p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="icon"><i class="fas fa-phone"></i></div>
                    <div class="info">
                        <h4>الهاتف</h4>
                        <p><a href="tel:+201229156909">01229156909</a></p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="icon"><i class="fab fa-whatsapp"></i></div>
                    <div class="info">
                        <h4>واتساب</h4>
                        <p><a href="https://wa.me/201229156909" target="_blank">01229156909</a></p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="icon"><i class="fas fa-envelope"></i></div>
                    <div class="info">
                        <h4>البريد الإلكتروني</h4>
                        <p><a href="mailto:info@alwaha.com">info@alwaha.com</a></p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="icon"><i class="fas fa-clock"></i></div>
                    <div class="info">
                        <h4>ساعات العمل</h4>
                        <p>السبت - الخميس: 8:00 ص - 10:00 م</p>
                        <p style="font-size:12px;color:#999;">الجمعة: 10:00 ص - 8:00 م</p>
                    </div>
                </div>
            </div>

            <!-- نموذج التواصل -->
            <div class="contact-form">
                <form id="contactForm" onsubmit="sendMessage(event)">
                    <div class="form-group">
                        <label>الاسم الكامل <span style="color:red;">*</span></label>
                        <input type="text" id="contactName" placeholder="أحمد محمد" required />
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني <span style="color:red;">*</span></label>
                        <input type="email" id="contactEmail" placeholder="example@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>رقم الجوال</label>
                        <input type="tel" id="contactPhone" placeholder="0123456789" />
                    </div>
                    <div class="form-group">
                        <label>نوع الاستفسار <span style="color:red;">*</span></label>
                        <select id="contactSubject" required>
                            <option value="">اختر نوع الاستفسار</option>
                            <option value="طلب">طلب شراء</option>
                            <option value="استفسار">استفسار عن منتج</option>
                            <option value="شكوى">شكوى أو اقتراح</option>
                            <option value="توصيل">استفسار عن التوصيل</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الرسالة <span style="color:red;">*</span></label>
                        <textarea id="contactMessage" placeholder="اكتب رسالتك هنا..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i> إرسال الرسالة
                    </button>
                </form>
            </div>
        </div>

        <!-- وسائل التواصل الاجتماعي -->
        <div class="social-section">
            <h3 style="color:var(--primary);">تابعنا على وسائل التواصل</h3>
            <div class="social-icons">
                <a href="https://wa.me/201229156909" class="whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://facebook.com/alwahastore" class="facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/alwahastore" class="instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/alwahastore" class="twitter" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://youtube.com/alwahastore" class="youtube" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
        </div>

        <div style="text-align:center;margin-top:10px;">
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
        </div>
    </div>

    <script>
        // تحميل الثيم المحفوظ
        const savedTheme = localStorage.getItem('alwaha_theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        
        document.querySelector('.theme-toggle').addEventListener('click', function() {
            const isDark = document.documentElement.hasAttribute('data-theme');
            document.documentElement.toggleAttribute('data-theme');
            localStorage.setItem('alwaha_theme', isDark ? 'light' : 'dark');
        });

        // إرسال الرسالة
        function sendMessage(e) {
            e.preventDefault();
            
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            const phone = document.getElementById('contactPhone').value;
            const subject = document.getElementById('contactSubject').value;
            const message = document.getElementById('contactMessage').value;
            
            // بناء رسالة واتساب
            const msg = `🌿 *رسالة جديدة من متجر الواحة*\n\n` +
                       `👤 *الاسم:* ${name}\n` +
                       `📧 *البريد:* ${email}\n` +
                       `📱 *الجوال:* ${phone || 'غير مدخل'}\n` +
                       `📌 *نوع الاستفسار:* ${subject}\n\n` +
                       `📝 *الرسالة:*\n${message}\n\n` +
                       `🌸 *شكراً لتواصلك مع متجر الواحة - سنرد عليك قريباً*`;
            
            const whatsappUrl = `https://wa.me/201229156909?text=${encodeURIComponent(msg)}`;
            
            // فتح واتساب
            window.open(whatsappUrl, '_blank');
            
            // إظهار رسالة نجاح
            alert('✅ تم إرسال رسالتك! جاري تحويلك إلى واتساب للمتابعة.');
            
            // إعادة تعيين النموذج
            document.getElementById('contactForm').reset();
        }
    </script>
</body>
      </html>
